name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '10.0.x'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  publish:
    name: publish-packages-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore --source "${{ env.NUGET_SOURCE }}"
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Pack
        run: |
          dotnet pack Processor.Abstractions/Esolang.Processor.Abstractions.csproj -c Release -o artifacts/nuget
      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY secret is not configured."
            exit 1
          fi
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            case "$pkg" in
              *.snupkg)
                continue
                ;;
            esac
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          for symbol_pkg in artifacts/nuget/*.snupkg; do
            dotnet nuget push "$symbol_pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            case "$pkg" in
              *.snupkg)
                continue
                ;;
            esac
            dotnet nuget push "$pkg" \
              --api-key "$GITHUB_TOKEN" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done
      - name: Create GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          shopt -s nullglob
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            artifacts/nuget/*.nupkg artifacts/nuget/*.snupkg || true
